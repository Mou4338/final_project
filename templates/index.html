<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection</title>
    <script src="/static/mywebscript.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f7fb;
            color: #1f2937;
        }

        main {
            max-width: 760px;
            margin: 48px auto;
            padding: 0 20px;
        }

        h1 {
            margin-bottom: 24px;
            font-size: 32px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #b8c2d6;
            border-radius: 6px;
            font: inherit;
            resize: vertical;
        }

        button {
            margin-top: 16px;
            padding: 10px 18px;
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: #ffffff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        #system_response {
            margin-top: 24px;
            padding: 16px;
            min-height: 24px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #ffffff;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <main>
        <h1>Emotion Detection</h1>
        <label for="textToAnalyze">Text to analyze</label>
        <textarea id="textToAnalyze" name="textToAnalyze"></textarea>
        <button type="button" onclick="runEmotionAnalysis()">Run Analysis</button>
        <div id="system_response"></div>
    </main>
</body>
</html>
